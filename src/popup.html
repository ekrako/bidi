<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 220px;
        padding: 12px;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        margin: 0;
      }
      .site {
        margin-bottom: 10px;
        color: #555;
        word-break: break-all;
      }
      .site span {
        font-weight: 600;
        color: #111;
      }
      #buttons {
        display: flex;
        gap: 6px;
      }
      button {
        flex: 1;
        padding: 6px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
      }
      button:hover {
        background: #f0f0f0;
      }
      button.active {
        background: #4a90d9;
        color: #fff;
        border-color: #4a90d9;
      }
      .default-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid #eee;
        color: #555;
        font-size: 12px;
        cursor: pointer;
      }
      .default-toggle input {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="site"><span id="hostname"></span></div>
    <div id="buttons"></div>
    <label class="default-toggle">
      <input type="checkbox" id="autoDefault" />
      Auto by default
    </label>
    <script src="popup.js"></script>
  </body>
</html>
