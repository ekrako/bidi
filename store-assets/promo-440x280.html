<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 440px;
      height: 280px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      background: linear-gradient(145deg, #0d1b2e 0%, #0f3460 60%, #1a5276 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 30px 32px;
    }

    /* Left side — branding */
    .left {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand img {
      width: 38px;
      height: 38px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    }
    .brand-name {
      font-size: 2rem;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.5px;
    }
    .tagline {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.75);
      line-height: 1.5;
      max-width: 195px;
    }
    .features {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-top: 2px;
    }
    .feature {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .feature::before {
      content: "✓";
      color: #4a90d9;
      font-weight: 700;
    }

    /* Right side — popup mockup */
    .popup-wrap {
      position: relative;
    }
    .popup {
      background: white;
      border-radius: 10px;
      padding: 14px;
      width: 165px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.3);
    }
    .popup-site {
      font-size: 10.5px;
      color: #888;
      text-align: center;
      margin-bottom: 10px;
    }
    .popup-site strong { color: #222; }
    .popup-btns {
      display: flex;
      gap: 4px;
      margin-bottom: 10px;
    }
    .pbtn {
      flex: 1;
      padding: 5px 0;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;
      text-align: center;
      border: 1px solid #ddd;
      color: #666;
      background: white;
    }
    .pbtn.active {
      background: #4a90d9;
      color: white;
      border-color: #4a90d9;
    }
    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 0 0 8px;
    }
    .rtl-text {
      font-size: 13px;
      color: #222;
      direction: rtl;
      text-align: right;
      line-height: 1.6;
    }
    .rtl-text .muted { color: #888; font-size: 11px; }
  </style>
</head>
<body>
  <div class="left">
    <div class="brand">
      <img src="../icons/logo-128.png" alt="BiDi" />
      <span class="brand-name">BiDi</span>
    </div>
    <div class="tagline">Smart RTL direction for Hebrew, Arabic &amp; Persian</div>
    <div class="features">
      <div class="feature">Auto RTL detection</div>
      <div class="feature">Per-site memory</div>
      <div class="feature">Synced across devices</div>
    </div>
  </div>

  <div class="popup-wrap">
    <div class="popup">
      <div class="popup-site">Site: <strong>chat.example.com</strong></div>
      <div class="popup-btns">
        <div class="pbtn">NONE</div>
        <div class="pbtn active">AUTO</div>
        <div class="pbtn">RTL</div>
      </div>
      <hr class="divider" />
      <div class="rtl-text">
        שלום! איך אתה?<br>
        <span class="muted">أهلاً! كيف حالك؟</span>
      </div>
    </div>
  </div>
</body>
</html>
