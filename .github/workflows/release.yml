name: Build and Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a GitHub Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun ci

      - name: Build the extension
        run: bun run build

      - name: Package extension (Zip)
        run: |
          cd dist
          zip -r ../bidi-release.zip ./*
          cd ..

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: bidi-extension-zip
          path: bidi-release.zip

      - name: Extract Version and Branch Info
        env:
          PRERELEASE_INPUT: ${{ github.event.inputs.prerelease }}
        run: |
          VERSION=$(jq -r .version manifest.json)
          BRANCH="${GITHUB_REF#refs/heads/}"
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')

          if [ "$BRANCH" = "main" ]; then
            TAG="v${VERSION}-build.${GITHUB_RUN_NUMBER}"
            NAME="BiDi v${VERSION} (Build ${GITHUB_RUN_NUMBER})"
            PRERELEASE="${PRERELEASE_INPUT:-false}"
          else
            TAG="v${VERSION}-${SAFE_BRANCH}.${GITHUB_RUN_NUMBER}"
            NAME="BiDi v${VERSION} (${BRANCH} #${GITHUB_RUN_NUMBER})"
            PRERELEASE="true"
          fi

          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
          echo "RELEASE_NAME=$NAME" >> $GITHUB_ENV
          echo "PRERELEASE=$PRERELEASE" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_NAME: ${{ env.RELEASE_NAME }}
          PRERELEASE: ${{ env.PRERELEASE }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          files: bidi-release.zip
          prerelease: ${{ env.PRERELEASE == 'true' }}
          generate_release_notes: true