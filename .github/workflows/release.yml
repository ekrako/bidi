name: Build and Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a GitHub Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun ci

      - name: Build the extension
        run: bun run build

      - name: Package extension (Zip)
        run: |
          cd dist
          zip -r ../bidi-release.zip ./*
          cd ..

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bidi-extension-zip
          path: bidi-release.zip

      - name: Extract Version from Manifest
        id: extract_version
        run: |
          VERSION=$(jq -r .version manifest.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: v${{ env.VERSION }}-build.${{ github.run_number }}
          name: BiDi v${{ env.VERSION }} (Build ${{ github.run_number }})
          files: bidi-release.zip
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || github.ref != 'refs/heads/main' }}
          generate_release_notes: true