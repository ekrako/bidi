name: Release to GitHub

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_release: ${{ steps.scope.outputs.should_release }}
      release_name: ${{ steps.metadata.outputs.release_name }}
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
      release_sha: ${{ steps.metadata.outputs.release_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Detect release-relevant changes
        id: scope
        run: |
          set -euo pipefail

          changed_files="$(git diff --name-only HEAD^1..HEAD 2>/dev/null | sort -u || true)"

          if [ -z "$changed_files" ]; then
            changed_files="$(git ls-tree --name-only -r HEAD)"
          fi

          if printf '%s\n' "$changed_files" | grep -Eq '^(src/|icons/|manifest\.json|build\.ts|index\.ts|package\.json|package-lock\.json|bun\.lock|tsconfig\.json)$'; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No release-relevant files changed; skipping GitHub release."
          echo "should_release=false" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        if: ${{ steps.scope.outputs.should_release == 'true' }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        if: ${{ steps.scope.outputs.should_release == 'true' }}
        run: bun ci

      - name: Build the extension
        if: ${{ steps.scope.outputs.should_release == 'true' }}
        run: bun run build

      - name: Package extension (Zip)
        if: ${{ steps.scope.outputs.should_release == 'true' }}
        run: |
          cd dist
          zip -r ../bidi-release.zip ./*
          cd ..

      - name: Upload Build Artifact
        if: ${{ steps.scope.outputs.should_release == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: bidi-extension-zip
          path: bidi-release.zip

      - name: Extract release metadata
        if: ${{ steps.scope.outputs.should_release == 'true' }}
        id: metadata
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          SOURCE_RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
        run: |
          set -euo pipefail

          VERSION=$(jq -r .version manifest.json)
          PR_COUNT=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/pulls" \
            --jq 'length')
          PRERELEASE=true

          if [ "$PR_COUNT" -gt 0 ]; then
            PRERELEASE=false
          fi

          TAG="v${VERSION}-build.${SOURCE_RUN_NUMBER}"
          NAME="BiDi v${VERSION} (Build ${SOURCE_RUN_NUMBER})"

          {
            echo "release_name=$NAME"
            echo "release_tag=$TAG"
            echo "prerelease=$PRERELEASE"
            echo "release_sha=$HEAD_SHA"
          } >> "$GITHUB_OUTPUT"

  github-release:
    needs: package-release
    if: ${{ needs.package-release.result == 'success' && needs.package-release.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: bidi-extension-zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ needs.package-release.outputs.release_tag }}
          name: ${{ needs.package-release.outputs.release_name }}
          target_commitish: ${{ needs.package-release.outputs.release_sha }}
          files: bidi-release.zip
          prerelease: ${{ fromJSON(needs.package-release.outputs.prerelease) }}
          generate_release_notes: true
